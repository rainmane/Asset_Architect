<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Architect | MTR Readiness Audit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #1e293b;
            padding: 24px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 500px; /* Tightened for a more professional "card" look */
            text-align: center;
        }

        .logo {
            width: 160px; 
            height: auto;
            margin: 0 auto 32px auto;
            display: block;
        }

        h1 {
            font-size: 2.25rem;
            letter-spacing: -0.04em;
            margin-bottom: 1rem;
            line-height: 1.1;
            font-weight: 700;
        }

        p {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        /* The Card Container */
        .form-wrapper {
            background: white;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            box-sizing: border-box;
            overflow: hidden; /* Prevents internal scrollbars */
        }

        /* Responsive Iframe Behavior */
        .beehiiv-embed {
            width: 100% !important;
            height: 320px; /* Increased from 220px to fit the new vertical stack */
            border: none;
        }

        /* Mobile specific overrides */
        @media (max-width: 480px) {
            body {
                justify-content: flex-start; /* Starts content at top on small phones */
                padding-top: 40px;
            }
            
            h1 {
                font-size: 1.75rem;
            }

            p {
                font-size: 1rem;
            }

            .form-wrapper {
                padding: 4px; /* Less internal padding gives more room to the form */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="/logo.png" alt="Asset Architect Logo" class="logo">

        <h1>Is your rental leaving cash on the table each month?</h1>
        <p>Most properties are missing the corporate market. Take the MTR Readiness Audit to see if you qualify for an Mid-Term Rental premium and sign up for our newsletter.</p>    
       
        <div class="form-wrapper">
           <script async src="https://subscribe-forms.beehiiv.com/embed.js"></script>
            <iframe src="https://subscribe-forms.beehiiv.com/a36bd855-d240-4bd6-9c77-2c27c19d366c" 
                    class="beehiiv-embed" 
                    data-test-id="beehiiv-embed"
                    frameborder="0"
                    scrolling="no" 
                    style="border-radius: 12px; background-color: transparent;">
            </iframe>
        </div>
    </div>

</body>
</html>
