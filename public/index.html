<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Architect | MTR Readiness Audit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #1e293b;
        }
        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        /* Logo Styling */
        .logo {
            width: 100px; /* Slightly larger for the homepage */
            height: auto;
            margin: 0 auto 32px auto;
            display: block;
        }
        h1 {
            font-size: 2.25rem;
            letter-spacing: -0.025em;
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        p {
            font-size: 1.125rem;
            color: #64748b;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .form-wrapper {
            background: white;
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .beehiiv-embed {
            margin: 0 auto !important;
            display: block;
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 1.75rem; }
            .container { padding-top: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="/logo.png" alt="Asset Architect Logo" class="logo">

        <h1>Is your rental leaving $1,800 a month on the table?</h1>
        <p>Most properties are set up for long-term tenants or weekend tourists, missing the high-paying corporate market in between. Take the 10-point MTR Readiness Audit to see if your property qualifies for a "Mid-Term" premium.</p>
        
        <div class="form-wrapper">
            <script async src="https://subscribe-forms.beehiiv.com/embed.js"></script>
            <iframe src="https://subscribe-forms.beehiiv.com/a36bd855-d240-4bd6-9c77-2c27c19d366c" 
                    class="beehiiv-embed" 
                    data-test-id="beehiiv-embed" 
                    frameborder="0" 
                    scrolling="no" 
                    style="width: 100%; height: 207px; border-radius: 12px; background-color: transparent;">
            </iframe>
        </div>
    </div>

</body>
</html>
